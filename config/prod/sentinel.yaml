service:
  host: "0.0.0.0"
  port: 8080

logging:
  backend: "syslog"
  level: "info"
  ident: "video_sentinel"

inference:
  backend: "ascendcl"
  model_path: "models/yolo/yolo26n.om"
  device_id: 0

preprocess:
  backend: "opencv"
  output_width: 640
  output_height: 640
  output_layout: "NCHW"
  output_dtype: "FP32"
  normalize: true

postprocess:
  backend: "opencv"
  model_type: "yolo"
  output_layout: "channels_first"
  num_classes: 80
  confidence_threshold: 0.25
  nms_iou_threshold: 0.45
  max_detections: 100
  merge_coco_vehicles: true

overlay:
  enabled: true
  backend: "opencv"

output:
  video_sink: "none"
  debug_image_dir: "debug/frames"
  debug_image_interval: 30

runtime:
  data_dir: "/var/lib/video-sentinel"

pipeline:
  max_frames: 300
