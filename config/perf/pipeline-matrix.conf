# SentinelEdge 单 pipeline 矩阵性能测试配置。
#
# 使用方式：
#   scripts/run-board-pipeline-matrix.sh config/perf/pipeline-matrix.conf
#
# 说明：
# - 输出通道固定为 none，不作为矩阵变量。
# - BACKENDS 中的每个后端都会绑定对应的模型和 preprocess profile。
# - 这是“各后端最优配置”对比，不要求 OpenCV 和 DVPP 使用同一个 OM。
# - OpenCV 使用普通 NCHW/FP32 OM；DVPP 使用静态 AIPP NV12/UINT8 OM。

PACKAGE_DIR="build/board-native-debug-package"
CONFIG_DIR="config/dev"

FRAMES=300
INTERVAL=30
WARMUP_FRAMES=5

BACKENDS=("opencv" "dvpp")
BUFFER_MODES=("loaned" "copy")

OPENCV_MODEL_PATH="models/yolo/yolo26n.om"
OPENCV_OUTPUT_LAYOUT="NCHW"
OPENCV_OUTPUT_DTYPE="FP32"
OPENCV_NORMALIZE="true"

DVPP_MODEL_PATH="models/yolo/yolo26n_aipp_nv12.om"
DVPP_OUTPUT_LAYOUT="NV12"
DVPP_OUTPUT_DTYPE="UINT8"
DVPP_NORMALIZE="false"

CSV_DIR="perf/matrix"
LOG_DIR="data/dev/perf/matrix"
REPORT_PATH="data/dev/perf/pipeline-matrix-report.md"
REPORT_TITLE="SentinelEdge Pipeline 性能测试报告"
