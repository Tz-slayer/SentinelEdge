# SentinelEdge 单 pipeline 矩阵性能测试配置。
#
# 使用方式：
#   scripts/run-board-pipeline-matrix.sh config/perf/pipeline-matrix.conf
#
# 说明：
# - 输出通道固定为 none，不作为矩阵变量。
# - 默认只对比同一 DVPP pipeline 下 copy / loaned 的 V4L2 缓冲区模式。
# - 如果要加入 opencv，请确认模型输入格式和 preprocess 配置也同步匹配。

PACKAGE_DIR="build/board-native-debug-package"
CONFIG_DIR="config/dev"

FRAMES=300
INTERVAL=30
WARMUP_FRAMES=5

BACKENDS=("dvpp")
BUFFER_MODES=("loaned" "copy")

CSV_DIR="perf/matrix"
LOG_DIR="data/dev/perf/matrix"
REPORT_PATH="data/dev/perf/pipeline-matrix-report.md"
REPORT_TITLE="SentinelEdge Pipeline 性能测试报告"
