service:
  host: "127.0.0.1"
  port: 8080

logging:
  backend: "stderr"
  level: "debug"
  ident: "video_sentinel_test"

inference:
  backend: "mock"
  model_path: "models/yolo/yolo26n.om"
  device_id: 0

preprocess:
  backend: "opencv"
  output_width: 640
  output_height: 640
  output_layout: "NCHW"
  output_dtype: "FP32"
  normalize: true

postprocess:
  backend: "opencv"
  model_type: "yolo"
  output_layout: "channels_first"
  num_classes: 80
  confidence_threshold: 0.25
  nms_iou_threshold: 0.45
  max_detections: 100
  merge_coco_vehicles: true

overlay:
  enabled: false
  backend: "opencv"

output:
  video_sink: "none"
  debug_image_dir: "debug/frames"
  debug_image_interval: 1
  mjpeg_host: "0.0.0.0"
  mjpeg_port: 8081
  mjpeg_path: "/stream"
  mjpeg_quality: 80
  mjpeg_max_clients: 4

runtime:
  data_dir: "./data/test"

pipeline:
  max_frames: 5
